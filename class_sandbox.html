<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>志願沙盤 · 迎戰學測 2027</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --text:#e8eaf6;--muted:#6b7280;
  --green:#22c55e;--green-dim:#15532e;
  --yellow:#eab308;--yellow-dim:#422006;
  --orange:#f97316;--orange-dim:#431407;
  --red:#ef4444;--red-dim:#450a0a;
  --blue:#3b82f6;--blue-dim:#1e3a8a;
  --accent:#818cf8;--teal:#14b8a6;--teal-dim:#134e4a;
  --admin:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:16px;font-size:15px;}

/* ── Auth screen ── */
.auth-screen{max-width:380px;margin:60px auto;}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo h1{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:1px;}
.auth-logo p{font-size:11px;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;}
.auth-card h2{font-size:14px;font-weight:700;margin-bottom:20px;color:var(--text);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace;letter-spacing:.5px;}
.auth-field select,.auth-field input{width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:8px;font-size:15px;font-family:'Noto Sans TC',sans-serif;transition:border-color .2s;appearance:none;}
.auth-field select:focus,.auth-field input:focus{outline:none;border-color:var(--accent);}
.auth-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;
  color:white;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;
  font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
.auth-btn:hover{opacity:.85;}
.auth-btn.admin-btn{background:var(--admin);color:#1a1100;}
.auth-divider{text-align:center;color:var(--muted);font-size:12px;margin:14px 0;font-family:'Space Mono',monospace;}
.auth-error{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.session-notice{background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.3);border-radius:8px;
  padding:10px 14px;font-size:12px;color:var(--accent);margin-bottom:14px;text-align:center;}

/* ── Header ── */
.app-header{display:flex;justify-content:space-between;align-items:center;padding:0 0 16px;margin-bottom:4px;}
.app-title h1{font-size:18px;font-weight:900;color:var(--accent);}
.app-title p{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.user-badge{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.user-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.user-badge.admin .dot{background:var(--admin);}

/* ── Admin bar ── */
.admin-bar{background:linear-gradient(135deg,#1a1100,#2a1f00);border:1px solid var(--admin);
  border-radius:12px;padding:12px 14px;margin-bottom:16px;display:none;}
.admin-bar.show{display:block;}
.admin-bar-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--admin);margin-bottom:8px;letter-spacing:.5px;}
.admin-bar select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:14px;font-family:'Noto Sans TC',sans-serif;appearance:none;}
.admin-tools{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.admin-tool-btn{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.admin-tool-btn:hover{border-color:var(--admin);color:var(--admin);}

/* ── Decoder ── */
.decoder-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;display:none;}
.decoder-panel.show{display:block;}
.decoder-panel h3{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--admin);}
.decoder-panel textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:10px;border-radius:8px;font-size:11px;resize:vertical;min-height:80px;font-family:'Space Mono',monospace;}
.decoder-panel input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px;font-family:'Noto Sans TC',sans-serif;}
.decoder-btn{margin-top:10px;padding:9px 18px;background:var(--admin);border:none;border-radius:8px;
  color:#1a1100;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}

/* ── Main app ── */
#app{display:none;}
.section-title{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden;}
.score-box::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
.score-box.green::before{background:var(--green);}
.score-box.yellow::before{background:var(--yellow);}
.score-box.orange::before{background:var(--orange);}
.score-subj{font-size:11px;color:var(--muted);margin-bottom:4px;}
.score-num{font-size:28px;font-weight:900;font-family:'Space Mono',monospace;line-height:1;}
.score-box.green  .score-num{color:var(--green);}
.score-box.yellow .score-num{color:var(--yellow);}
.score-box.orange .score-num{color:var(--orange);}
.score-tag{font-size:10px;margin-top:4px;padding:2px 6px;border-radius:4px;display:inline-block;}
.score-box.green  .score-tag{background:var(--green-dim);color:var(--green);}
.score-box.yellow .score-tag{background:var(--yellow-dim);color:var(--yellow);}
.score-box.orange .score-tag{background:var(--orange-dim);color:var(--orange);}

.sim-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.sim-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sim-badge{font-size:10px;font-family:'Space Mono',monospace;background:var(--blue-dim);color:var(--blue);padding:2px 7px;border-radius:4px;}
.autosave-note{font-size:10px;color:var(--teal);font-family:'Space Mono',monospace;margin-left:auto;}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slider-label{width:36px;font-size:12px;color:var(--muted);flex-shrink:0;}
input[type=range]{flex:1;height:4px;appearance:none;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;transition:transform .1s;}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.3);}
.slider-val{width:28px;text-align:right;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;}
.reset-btn{display:block;width:100%;margin-top:4px;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.reset-btn:hover{border-color:var(--accent);color:var(--accent);}

.target-card{border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid;transition:all .3s ease;}
.target-card.dream{background:#1a1d27;border-color:var(--accent);}
.target-card.real {background:#1a1d27;border-color:#38bdf8;}
.target-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.target-label{font-size:10px;font-family:'Space Mono',monospace;letter-spacing:.5px;margin-bottom:4px;}
.target-card.dream .target-label{color:var(--accent);}
.target-card.real  .target-label{color:#38bdf8;}
.target-name{font-size:16px;font-weight:700;line-height:1.3;}
.target-quota{font-size:11px;color:var(--muted);text-align:right;font-family:'Space Mono',monospace;}
.verdict{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:12px;}
.verdict.pass{background:var(--green-dim);color:var(--green);}
.verdict.warn{background:var(--yellow-dim);color:var(--yellow);}
.verdict.fail{background:var(--red-dim);color:var(--red);}
.verdict.keda{background:var(--blue-dim);color:var(--blue);}
.gaps-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px;}
.gap-item{padding:8px 10px;border-radius:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center;}
.gap-item.pass{background:var(--green-dim);color:var(--green);}
.gap-item.warn{background:var(--yellow-dim);color:var(--yellow);}
.gap-item.fail{background:var(--red-dim);color:var(--red);}
.gap-item.skip{background:var(--surface2);color:var(--muted);}
.gap-item-subj{font-weight:700;}.gap-item-val{font-family:'Space Mono',monospace;font-size:11px;}
.weak-panel{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.weak-panel-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;}
.weak-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.weak-bar-label{width:30px;font-size:11px;color:var(--muted);}
.weak-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.weak-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.weak-bar-val{width:28px;text-align:right;font-size:11px;font-family:'Space Mono',monospace;}
.screen-result{background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:10px;}
.screen-result strong{color:var(--text);}
.advice-box{border-left:3px solid var(--accent);padding:8px 12px;font-size:12px;color:var(--muted);line-height:1.7;background:rgba(129,140,248,.05);border-radius:0 8px 8px 0;}
.advice-title{font-size:11px;font-family:'Space Mono',monospace;color:var(--accent);margin-bottom:4px;}
.no-data{text-align:center;padding:20px;color:var(--muted);font-size:13px;}

.save-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.save-section h3{font-size:13px;font-weight:700;margin-bottom:4px;}
.save-section p{font-size:11px;color:var(--muted);margin-bottom:12px;}
.code-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;
  font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);word-break:break-all;
  line-height:1.5;max-height:80px;overflow:hidden;margin-bottom:10px;}
.copy-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:8px;color:white;
  font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
.copy-btn:hover{opacity:.85;}.copy-btn.copied{background:var(--green);}

.footer{text-align:center;padding:24px 0 8px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
.footer a{color:var(--muted);text-decoration:none;}.footer a:hover{color:var(--accent);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;
  z-index:999;transition:all .3s;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .3s ease forwards;}

/* ── Ability risk panel ── */
.ability-risk-panel{
  margin-top:14px;
  background:linear-gradient(135deg,rgba(249,115,22,.07),rgba(239,68,68,.05));
  border:1px solid rgba(249,115,22,.3);border-radius:12px;overflow:hidden;
}
.ability-risk-title{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(249,115,22,.08);border-bottom:1px solid rgba(249,115,22,.2);
  font-size:13px;font-weight:700;color:#f97316;
}
.ability-risk-sub{
  margin-left:auto;font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:2px;color:rgba(249,115,22,.5);
}
.ability-risk-item{padding:12px 14px;border-bottom:1px solid rgba(249,115,22,.12);}
.ability-risk-item:last-child{border-bottom:none;}
.ability-risk-item-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ability-risk-icon{font-size:14px;flex-shrink:0;}
.ability-risk-label{font-size:12px;font-weight:700;color:var(--text);flex-shrink:0;}
.ability-risk-pct{font-family:'Space Mono',monospace;font-size:11px;color:#f97316;font-weight:700;flex-shrink:0;}
.ability-risk-bar-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.ability-risk-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#ef4444,#f97316);transition:width .4s ease;}
.ability-risk-msg{font-size:11px;color:var(--muted);line-height:1.7;padding-left:22px;}
.ability-risk-msg strong{color:var(--text);}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-screen">
    <div class="auth-logo">
      <h1>🛡 迎戰學測 2027</h1>
      <p>SANDBOX · STRATEGIC COMMAND</p>
    </div>
    <div id="sessionNotice" class="session-notice" style="display:none"></div>
    <div class="auth-card">
      <h2>身份驗證</h2>
      <div class="auth-field">
        <label>座號 SEAT NO.</label>
        <select id="authSeat">
          <option value="">— 請選擇 —</option>
        </select>
      </div>
      <div class="auth-field">
        <label>身分證後四碼 ID TAIL</label>
        <input type="password" id="authTail" placeholder="●●●●" maxlength="4"
          inputmode="numeric" autocomplete="off">
      </div>
      <button class="auth-btn" onclick="loginStudent()">進入沙盤</button>
      <div class="auth-divider">— 或 —</div>
      <div class="auth-field">
        <label>管理員密碼 ADMIN</label>
        <input type="password" id="authAdmin" placeholder="●●●●●●●●"
          autocomplete="off" onkeydown="if(event.key==='Enter')loginAdmin()">
      </div>
      <button class="auth-btn admin-btn" onclick="loginAdmin()">管理員登入</button>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <div class="app-title">
      <h1>志願沙盤</h1>
      <p id="appSubtitle">龍津導班 · 115學年度</p>
    </div>
    <div class="user-badge" id="userBadge" onclick="logout()">
      <span class="dot"></span>
      <span id="userBadgeText">─</span>
      <span style="color:var(--muted);font-size:10px">登出</span>
    </div>
  </div>

  <div class="admin-bar" id="adminBar">
    <div class="admin-bar-title">⚡ ADMIN MODE — 切換查看學生</div>
    <select id="adminStudentSelect" onchange="adminSwitchStudent()">
      <option value="">── 選擇學生 ──</option>
    </select>
    <div class="admin-tools">
      <button class="admin-tool-btn" onclick="toggleDecoder()">📥 代碼轉換下載器</button>
      <button class="admin-tool-btn" onclick="exportAllChoices()">📦 匯出所有志願</button>
    </div>
  </div>

  <div class="decoder-panel" id="decoderPanel">
    <h3>📥 代碼轉換下載器</h3>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">貼入學生給你的志願代碼，自動產生 JSON 檔案</p>
    <textarea id="decoderInput" placeholder="貼上學生傳來的志願代碼（JSON 字串）"></textarea>
    <input type="text" id="decoderStudentId" placeholder="學生學號（例：310032）→ 檔名將為 310032.json">
    <button class="decoder-btn" onclick="runDecoder()">⬇ 轉換並下載</button>
  </div>

  <div class="section-title">本次模考成績</div>
  <div class="score-grid" id="scoreGrid"></div>
  <div class="sim-card">
    <div class="sim-title">
      如果我進步⋯⋯ <span class="sim-badge">沙盤模擬</span>
      <span class="autosave-note" id="autosaveNote"></span>
    </div>
    <div id="sliders"></div>
    <button class="reset-btn" onclick="resetSliders()">↺ 重設為目前成績</button>
  </div>

  <div class="section-title">志願缺口分析</div>
  <div id="targets"></div>

  <div class="save-section" id="saveSection">
    <h3>📋 複製志願代碼</h3>
    <p>將以下代碼傳給老師，讓老師幫你存入系統</p>
    <div class="code-box" id="codeBox">─</div>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">複製代碼</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="footer"><a href="./index.html">← 回到指揮部</a> · 龍津導班 · 115學年度個人申請</div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const ADMIN_HASH   = "5d35c52338cc19ae66b676e6f8ad0d803aca3772f26bc7fbe2abdecb2900a499";
const STU_PATH     = "./data/students.json";
const MOCK_PATH    = "./data/mock_exams/2026_mock_01.json";
const GATES_PATH        = "./data/gates.json";
const TARGETS_PATH      = "./data/targets.json";
const SECTIONS_META_PATH = "./data/sections_meta.json";

// Runtime data — populated by loadCoreData()
let GATES_113 = {};
const SUBJ_LIST    = ['國文','英文','數A','數B','自然','社會'];
const MOCK_TARGETS = {國文:13,英文:7,數A:6,數B:6,自然:7,社會:11};

// APP_DATA — loaded from ./data/targets.json
let APP_DATA = {};

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let isAdmin=false, currentStudentId=null, currentStudentName='', allStudents=[], mockScores={}, boosts={};
let _sectionsMeta = {};          // sections_meta.json english block
let _abilityPcts  = null;        // {reading, vocab, writing} as 0–1 ratios, or null

// ══════════════════════════════════════════════════════
//  CRYPTO
// ══════════════════════════════════════════════════════
async function sha256(str) {
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
window.onload = async () => {
  await loadCoreData();

  // Check sessionStorage.role / student_id — if already logged in from index, skip auth
  const ssRole = sessionStorage.getItem('role');
  const ssSid  = sessionStorage.getItem('student_id');
  if (ssRole === 'admin') {
    const notice = document.getElementById('sessionNotice');
    notice.style.display = 'block';
    notice.textContent = '⚡ 已從指揮部繼承管理員身份，可直接進入';
  } else if (ssRole === 'individual' && ssSid) {
    const notice = document.getElementById('sessionNotice');
    const ssSeat = sessionStorage.getItem('seat') || '';
    const ssName = sessionStorage.getItem('name') || '';
    notice.style.display = 'block';
    notice.textContent = `✓ 已登入：座號 ${ssSeat} ${ssName} — 或重新驗證以繼續`;
  }

  // Populate seat select
  const sel = document.getElementById('authSeat');
  allStudents.sort((a,b)=>a.seat-b.seat).forEach(s => {
    const opt=document.createElement('option');
    opt.value=s.seat; opt.textContent=`${s.seat}號 ${s.name}`; sel.appendChild(opt);
  });

  document.getElementById('authTail').addEventListener('keydown', e => {
    if (e.key==='Enter') loginStudent();
  });
};

async function loadCoreData() {
  try {
    const [stuRes, mockRes, gatesRes, targetsRes, metaRes] = await Promise.allSettled([
      fetch(STU_PATH          +'?v='+Date.now()).then(r=>r.ok?r.json():null),
      fetch(MOCK_PATH         +'?v='+Date.now()).then(r=>r.ok?r.json():null),
      fetch(GATES_PATH        +'?v='+Date.now()).then(r=>r.ok?r.json():null),
      fetch(TARGETS_PATH      +'?v='+Date.now()).then(r=>r.ok?r.json():null),
      fetch(SECTIONS_META_PATH+'?v='+Date.now()).then(r=>r.ok?r.json():null),
    ]);
    if (stuRes.value?.students)  allStudents = stuRes.value.students;
    if (mockRes.value?.students) {
      Object.entries(mockRes.value.students).forEach(([sid,s])=>{
        mockScores[sid]={國文:s.國文,英文:s.英文,數A:s.數A,數B:s.數B,自然:s.自然,社會:s.社會};
      });
    }
    if (gatesRes.value)        GATES_113     = gatesRes.value;
    if (targetsRes.value)      APP_DATA      = targetsRes.value;
    if (metaRes.value?.english) _sectionsMeta = metaRes.value.english;
  } catch(e) { console.warn('loadCoreData failed:', e); }
  // Fallback: if gates.json missing, use hardcoded values
  if (!Object.keys(GATES_113).length) {
    GATES_113 = {
      頂標:{國文:13,英文:13,數A:12,數B:12,自然:13,社會:13},
      前標:{國文:12,英文:11,數A:10,數B:9, 自然:12,社會:12},
      均標:{國文:11,英文:8, 數A:7, 數B:6, 自然:9, 社會:10},
      後標:{國文:9, 英文:5, 數A:5, 數B:4, 自然:6, 社會:8},
      底標:{國文:8, 英文:3, 數A:3, 數B:3, 自然:5, 社會:6},
    };
    console.warn('gates.json not loaded — using hardcoded fallback');
  }
  // Fallback: build student list from APP_DATA if fetch failed
  if (!allStudents.length) {
    allStudents = Object.keys(APP_DATA).map((id,i)=>({id,seat:i+1,name:'(名單載入失敗)'}));
  }
}

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
async function loginStudent() {
  const seatVal = parseInt(document.getElementById('authSeat').value);
  const tail    = document.getElementById('authTail').value.trim();
  const errEl   = document.getElementById('authError');
  errEl.textContent='';
  if (!seatVal) { errEl.textContent='請先選擇座號'; return; }
  if (!tail)    { errEl.textContent='請輸入後四碼'; return; }
  const padded = tail.padStart(4,'0');
  if (!/^\d{4}$/.test(padded)) { errEl.textContent='後四碼必須是數字'; return; }

  const stu = allStudents.find(s=>s.seat===seatVal);
  if (!stu) { errEl.textContent='找不到該座號，請確認'; return; }

  const computed = await sha256('501'+stu.id+padded);
  if (computed !== stu.id_tail_hash) { errEl.textContent='後四碼不符，請再確認'; return; }

  isAdmin=false; currentStudentId=stu.id; currentStudentName=stu.name;
  // Sync session
  sessionStorage.setItem('role',       'individual');
  sessionStorage.setItem('student_id', stu.id);
  sessionStorage.setItem('seat',       String(seatVal));
  sessionStorage.setItem('name',       stu.name);
  enterApp();
}

async function loginAdmin() {
  const pw = document.getElementById('authAdmin').value.trim();
  const errEl = document.getElementById('authError');
  if (!pw) { errEl.textContent='請輸入管理員密碼'; return; }
  const h = await sha256(pw);
  if (h !== ADMIN_HASH) { errEl.textContent='管理員密碼錯誤'; return; }
  isAdmin=true; currentStudentId=null; currentStudentName='ADMIN';
  sessionStorage.setItem('role',       'admin');
  sessionStorage.setItem('student_id', '');
  sessionStorage.setItem('seat',       '');
  sessionStorage.setItem('name',       '管理員');
  enterApp();
}

function logout() {
  sessionStorage.removeItem('role');
  sessionStorage.removeItem('student_id');
  sessionStorage.removeItem('seat');
  sessionStorage.removeItem('name');
  document.getElementById('app').style.display='none';
  document.getElementById('authScreen').style.display='block';
  document.getElementById('authSeat').value='';
  document.getElementById('authTail').value='';
  document.getElementById('authAdmin').value='';
  currentStudentId=null; isAdmin=false;
}

async function enterApp() {
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='block';
  const badge=document.getElementById('userBadge'), text=document.getElementById('userBadgeText');
  if (isAdmin) {
    badge.classList.add('admin'); text.textContent='⚡ ADMIN';
    document.getElementById('adminBar').classList.add('show');
    document.getElementById('saveSection').style.display='none';
    buildAdminSelect();
    if (allStudents.length) {
      currentStudentId=allStudents[0].id;
      document.getElementById('adminStudentSelect').value=currentStudentId;
    }
  } else {
    badge.classList.remove('admin');
    const stu=allStudents.find(s=>s.id===currentStudentId);
    const seat=stu?String(stu.seat).padStart(3,'0'):'?';
    text.textContent=`${seat} ${currentStudentName}`;
    document.getElementById('saveSection').style.display='block';
    loadChoicesFromStorage();
  }
  // Load ability data for the current student (non-blocking, safe skip)
  _abilityPcts = null;
  if (currentStudentId) {
    loadAbilityData(currentStudentId).catch(() => { _abilityPcts = null; });
  }
  resetSliders(); renderAll();
}

// ══════════════════════════════════════════════════════
//  ADMIN SELECT
// ══════════════════════════════════════════════════════
function buildAdminSelect() {
  const sel=document.getElementById('adminStudentSelect');
  sel.innerHTML='<option value="">── 選擇學生 ──</option>';
  allStudents.sort((a,b)=>a.seat-b.seat).forEach(s=>{
    const opt=document.createElement('option');
    opt.value=s.id; opt.textContent=`${String(s.seat).padStart(3,'0')} ${s.name}`;
    sel.appendChild(opt);
  });
}
function adminSwitchStudent() {
  const sid=document.getElementById('adminStudentSelect').value; if(!sid)return;
  currentStudentId=sid;
  const stu=allStudents.find(s=>s.id===sid); currentStudentName=stu?stu.name:'';
  resetSliders(); renderAll();
}

// ══════════════════════════════════════════════════════
//  SLIDERS
// ══════════════════════════════════════════════════════
function resetSliders() { boosts={國文:0,英文:0,數A:0,數B:0,自然:0,社會:0}; buildSliders(); }
function buildSliders() {
  const c=document.getElementById('sliders'); if(!c)return; c.innerHTML='';
  const scores=getScore();
  SUBJ_LIST.forEach(subj=>{
    const cur=scores[subj]||0, max=Math.min(5,15-cur);
    const row=document.createElement('div'); row.className='slider-row';
    row.innerHTML=`<span class="slider-label">${subj}</span>
      <input type="range" min="0" max="${max}" value="${boosts[subj]||0}" oninput="onSlider('${subj}',this.value)">
      <span class="slider-val" id="sv_${subj}">+${boosts[subj]||0}</span>`;
    c.appendChild(row);
  });
}
function onSlider(subj,val) { boosts[subj]=parseInt(val); document.getElementById('sv_'+subj).textContent=`+${val}`; renderAll(); if(!isAdmin)autoSave(); }

// ══════════════════════════════════════════════════════
//  SCORE HELPERS
// ══════════════════════════════════════════════════════
function getScore() { return mockScores[currentStudentId]||{國文:0,英文:0,數A:0,數B:0,自然:0,社會:0}; }
function getSimScore() { const b=getScore(),s={}; SUBJ_LIST.forEach(k=>s[k]=Math.min(15,(b[k]||0)+(boosts[k]||0))); return s; }

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function renderAll() {
  if(!currentStudentId)return;
  const sim=getSimScore(); renderScores(sim); renderTargets(sim);
  renderAbilityRisk();
  if(!isAdmin)updateCodeBox();
  document.getElementById('autosaveNote').textContent=isAdmin?'':'自動儲存中 ●';
}
function renderScores(sim) {
  const grid=document.getElementById('scoreGrid'); grid.innerHTML='';
  SUBJ_LIST.forEach(subj=>{
    const g=sim[subj],t=MOCK_TARGETS[subj],diff=t-g;
    const cls=diff<=0?'green':diff<=2?'yellow':'orange';
    const tag=diff<=0?'達標':`差${diff}級`, b=boosts[subj]||0;
    grid.innerHTML+=`<div class="score-box ${cls}">
      <div class="score-subj">${subj}</div>
      <div class="score-num">${g}${b>0?`<span style="font-size:13px;opacity:.55">+${b}</span>`:''}</div>
      <div class="score-tag">${tag}</div></div>`;
  });
}
function checkGates(sim,gates) {
  const fails=[],warns=[];
  for(const[subj,std]of Object.entries(gates)){
    if(!std||std==='─'||!GATES_113[std])continue;
    const need=GATES_113[std][subj],have=sim[subj],gap=need-have;
    if(gap>0)fails.push({subj,std,need,have,gap}); else if(gap>-2)warns.push({subj,std,need,have});
  }
  return{fails,warns};
}
function calcWeakImpacts(sim,gates) {
  return SUBJ_LIST.map(subj=>{
    const w=(gates[subj]&&GATES_113[gates[subj]])?2.0:1.0;
    return{subj,impact:w*(15-(sim[subj]||0)),cur:sim[subj]||0,pct:Math.round(((sim[subj]||0)/15)*100)};
  }).sort((a,b)=>b.impact-a.impact);
}
function parseScreening(r114,sim) {
  if(!r114)return[];
  const re=/([國英數A數B自社]+(?:\+[國英數A數B自社]+)*)\s*=\s*(\d+)/g;
  const map={國:sim['國文'],英:sim['英文'],數A:sim['數A'],數B:sim['數B'],社:sim['社會'],自:sim['自然']};
  const res=[];let m;
  while((m=re.exec(r114))!==null){
    const parts=m[1].split('+');let total=0,ok=true,labels=[];
    for(const p of parts){let found=false;for(const[k,v]of Object.entries(map)){if(p.includes(k)){total+=v||0;labels.push(`${k}${v}`);found=true;break;}}if(!found){ok=false;break;}}
    if(ok&&labels.length){const thr=parseInt(m[2]);res.push({combo:labels.join('+'),total,thr,diff:total-thr,pass:total>=thr});}
  }
  return res;
}
function renderTargets(sim) {
  const c=document.getElementById('targets'); c.innerHTML='';
  const entry=APP_DATA[currentStudentId];
  if(!entry){c.innerHTML='<div class="no-data">此學生的志願資料尚未建立</div>';return;}
  [['dream','夢幻志願','✦'],['real','務實志願','◆']].forEach(([key,label,icon])=>{
    const t=entry[key];
    const isEmpty=!t||!t.name||t.name===''||t.name.includes('待確認')||t.name.includes('待補');
    const card=document.createElement('div'); card.className=`target-card ${key} fade-in`;
    if(isEmpty){card.innerHTML=`<div class="target-label">${icon} ${label}</div><div class="no-data">志願未填或待確認</div>`;c.appendChild(card);return;}
    const isKeda=t.keda;
    const{fails,warns}=isKeda?{fails:[],warns:[]}:checkGates(sim,t.gates||{});
    const weak=calcWeakImpacts(sim,t.gates||{});
    const screenRes=isKeda?[]:parseScreening(t.r114,sim);
    let vCls,vText;
    if(isKeda){vCls='keda';vText='升科大管道';}
    else if(fails.length){const f=fails[0];vCls='fail';vText=`⚠️ ${f.subj}未達${f.std}（需${f.need}，現${f.have}），無法報名`;}
    else if(warns.length){vCls='warn';vText='剛好通過，要穩住';}
    else{vCls='pass';vText='✓ 檢定通過，可以報名';}
    const gateItems=Object.entries(t.gates||{}).filter(([,std])=>std&&std!=='─'&&GATES_113[std]).map(([subj,std])=>{
      const need=GATES_113[std][subj],have=sim[subj],gap=need-have;
      const cls=gap<=0?'pass':gap<=2?'warn':'fail';
      const val=gap<=0?`✓ ${have}級`:`差${gap}（需${need}）`;
      return`<div class="gap-item ${cls}"><span class="gap-item-subj">${subj} ${std}</span><span class="gap-item-val">${val}</span></div>`;
    }).join('');
    const topWeak=weak.filter(i=>Object.keys(t.gates||{}).includes(i.subj)||i.cur<=6).slice(0,3);
    const barColors=['#ef4444','#f97316','#eab308'];
    const weakHTML=(!isKeda&&topWeak.length)?`<div class="weak-panel"><div class="weak-panel-title">加權影響力</div>${topWeak.map((it,idx)=>`<div class="weak-bar-row"><span class="weak-bar-label">${it.subj}</span><div class="weak-bar-track"><div class="weak-bar-fill" style="width:${it.pct}%;background:${barColors[idx]||'#888'}"></div></div><span class="weak-bar-val" style="color:${barColors[idx]||'#888'}">${it.cur}級</span></div>`).join('')}</div>`:'';
    let screenHTML='';
    if(isKeda)screenHTML='<div class="screen-result">升科大採計方式不同，請另行確認甄試科目與備審要求。</div>';
    else if(t.r114){screenHTML=`<div class="screen-result"><strong>114篩選門檻：</strong>${t.r114}<br>`;screenRes.forEach(r=>{const clr=r.pass?'var(--green)':'var(--red)';const msg=r.pass?`超過${r.diff}`:`差${Math.abs(r.diff)}`;screenHTML+=`<span style="color:${clr}">${r.pass?'✓':'✗'} ${r.combo}=${r.total}（需${r.thr}，${msg}）</span><br>`;});screenHTML+='</div>';}
    let adv=[];
    if(isKeda)adv.push('升科大管道，重點在術科或備審，請確認甄試方式。');
    else{if(fails.length){const f=fails[0];adv.push(`最緊急：<strong style="color:var(--red)">${f.subj}差${f.gap}級</strong>才有報名資格。`);}const missing=screenRes.filter(r=>!r.pass);if(missing.length){const m=missing[0];adv.push(`去年門檻 ${m.combo}=${m.thr}，你現在${m.total}，差${Math.abs(m.diff)}。`);}else if(screenRes.length)adv.push('去年篩選門檻你目前都過了，繼續穩住。');if(topWeak.length&&topWeak[0].cur<=8)adv.push(`加權最高：<strong style="color:var(--yellow)">${topWeak[0].subj}（${topWeak[0].cur}級）</strong>，這科進步最划算。`);}
    card.innerHTML=`<div class="target-header"><div><div class="target-label">${icon} ${label}</div><div class="target-name">${t.name}</div></div>${t.quota?`<div class="target-quota">招收<br>${t.quota}人</div>`:''}</div>${t.cond?`<div class="screen-result" style="margin-bottom:8px"><strong>採計：</strong>${t.cond}</div>`:''}<div class="verdict ${vCls}">${vText}</div><div class="gaps-grid">${gateItems||(isKeda?'':'<div class="gap-item skip">無特定檢定要求</div>')}</div>${weakHTML}${screenHTML}<div class="advice-box"><div class="advice-title">衝刺建議</div>${adv.join('<br>')||'整體方向正確，繼續穩定。'}</div>`;
    c.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════
//  STEP 10.1: loadManualSections — standalone loader
// ══════════════════════════════════════════════════════
async function loadManualSections(sid) {
  try {
    const r = await fetch(`./data/sections_manual/${sid}.json?v=${Date.now()}`);
    if (!r.ok) return null;
    const d = await r.json();
    return d?.records?.at(-1)?.sections ?? null;
  } catch(e) { return null; }
}

// ══════════════════════════════════════════════════════
//  ABILITY DATA — 3-source priority chain
//  reading / vocab / writing → normalised to 0–1 ratio
// ══════════════════════════════════════════════════════
async function loadAbilityData(sid) {
  const KEYS = ['reading', 'vocab', 'writing'];

  // ── Source 1: students.json analysis (already in allStudents) ──
  let primary = null;
  const stu = allStudents.find(s => s.id === sid);
  if (stu?.analysis) primary = stu.analysis;
  const primaryHasData = primary &&
    KEYS.some(k => primary[k] !== null && primary[k] !== undefined && primary[k] !== 0);

  // ── Source 2: sections_manual — via loadManualSections() (STEP 10.1) ──
  let manual = null;
  if (!primaryHasData) {
    manual = await loadManualSections(sid);  // safe skip built-in
  }

  // ── Source 3: exam_row.eng_sections — not available in sandbox (no exam JSON loaded)
  //    Safe skip; _abilityPcts stays null if no other source has data. ──

  // ── Merge & normalise ──
  const result = {};
  let anyData = false;
  for (const k of KEYS) {
    const raw = (primary?.[k] ?? null) ?? (manual?.[k] ?? null);
    const max = _sectionsMeta[k] ?? null;
    if (raw !== null && raw !== undefined && raw !== 0 && max) {
      result[k] = raw / max;   // 0–1 ratio
      anyData = true;
    } else {
      result[k] = null;
    }
  }

  _abilityPcts = anyData ? result : null;

  // Re-render risk panel now that data is ready
  renderAbilityRisk();
}

// ── Ability risk panel ────────────────────────────────
function renderAbilityRisk() {
  const container = document.getElementById('targets');
  if (!container) return;

  // Remove previous panel (safe)
  container.querySelector('.ability-risk-panel')?.remove();

  // Nothing to show: no data, or admin mode
  if (!_abilityPcts || isAdmin) return;

  const THRESHOLD = 0.60;
  const warnings = [];

  if (_abilityPcts.reading !== null && _abilityPcts.reading < THRESHOLD) {
    const pct = Math.round(_abilityPcts.reading * 100);
    warnings.push({
      icon: '📖',
      key:  'reading',
      label: '閱讀理解',
      pct,
      msg: `閱讀理解能力 ${pct}%，長文理解效率偏低，可能影響英文整體表現。`,
    });
  }

  if (_abilityPcts.vocab !== null && _abilityPcts.vocab < THRESHOLD) {
    const pct = Math.round(_abilityPcts.vocab * 100);
    warnings.push({
      icon: '📝',
      key:  'vocab',
      label: '詞彙能力',
      pct,
      msg: `詞彙能力 ${pct}%，基礎詞彙量不足，可能影響閱讀與作答效率。`,
    });
  }

  if (_abilityPcts.writing !== null && _abilityPcts.writing < THRESHOLD) {
    const pct = Math.round(_abilityPcts.writing * 100);
    warnings.push({
      icon: '✍️',
      key:  'writing',
      label: '寫作能力',
      pct,
      msg: `英文表達能力 ${pct}%，非選擇題得分率偏低，影響整體總分表現。`,
    });
  }

  // No warnings → nothing to render
  if (!warnings.length) return;

  const itemsHTML = warnings.map(w => `
    <div class="ability-risk-item">
      <div class="ability-risk-item-head">
        <span class="ability-risk-icon">${w.icon}</span>
        <span class="ability-risk-label">${w.label}</span>
        <span class="ability-risk-pct">${w.pct}%</span>
        <div class="ability-risk-bar-track">
          <div class="ability-risk-bar-fill" style="width:${w.pct}%"></div>
        </div>
      </div>
      <div class="ability-risk-msg">${w.msg}</div>
    </div>`).join('');

  const panel = document.createElement('div');
  panel.className = 'ability-risk-panel';
  panel.innerHTML = `
    <div class="ability-risk-title">
      <span>⚠️</span>
      <span>能力風險提示</span>
      <span class="ability-risk-sub">ABILITY RISK ALERT</span>
    </div>
    ${itemsHTML}`;

  container.appendChild(panel);
}

// ══════════════════════════════════════════════════════
//  LOCALSTORAGE & CODE
// ══════════════════════════════════════════════════════
function autoSave() {
  if(!currentStudentId||isAdmin)return;
  localStorage.setItem(`sandbox_${currentStudentId}`,JSON.stringify({student_id:currentStudentId,last_update:new Date().toISOString().split('T')[0],boosts}));
}
function loadChoicesFromStorage() {
  if(!currentStudentId)return;
  const raw=localStorage.getItem(`sandbox_${currentStudentId}`);
  if(!raw)return;
  try{const d=JSON.parse(raw);if(d.boosts){boosts={...d.boosts};buildSliders();}}catch(e){}
}
function buildChoicePayload(){return{student_id:currentStudentId,student_name:currentStudentName,last_update:new Date().toISOString().split('T')[0],boosts,sim_score:getSimScore()};}
function updateCodeBox(){document.getElementById('codeBox').textContent=JSON.stringify(buildChoicePayload());}
function copyCode(){const code=JSON.stringify(buildChoicePayload(),null,2);navigator.clipboard.writeText(code).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='✓ 已複製！';btn.classList.add('copied');setTimeout(()=>{btn.textContent='複製代碼';btn.classList.remove('copied');},2000);}).catch(()=>showToast('已複製到剪貼簿'));}

// ══════════════════════════════════════════════════════
//  ADMIN TOOLS
// ══════════════════════════════════════════════════════
function toggleDecoder(){document.getElementById('decoderPanel').classList.toggle('show');}
function runDecoder(){const raw=document.getElementById('decoderInput').value.trim(),sid=document.getElementById('decoderStudentId').value.trim();if(!raw){showToast('請貼入學生代碼');return;}try{JSON.parse(raw);const blob=new Blob([raw],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${sid||'student'}.json`;a.click();showToast(`已下載 ${a.download}`);}catch(e){showToast('代碼格式錯誤，請確認 JSON 格式');}}
function exportAllChoices(){const all={};allStudents.forEach(s=>{const raw=localStorage.getItem(`sandbox_${s.id}`);if(raw){try{all[s.id]=JSON.parse(raw);}catch{}}});if(!Object.keys(all).length){showToast('目前沒有學生的 localStorage 資料');return;}const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`sandbox_all_choices_${new Date().toISOString().split('T')[0]}.json`;a.click();showToast('已匯出所有已儲存志願');}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function showToast(msg,dur=2000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
